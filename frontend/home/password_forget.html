<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
</head>
<body>
    <form id="forgetPasswordForm"
          action="http://127.0.0.1:8000/reset_pw/forget_pw"
          method="POST"
          enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="token" id="token">

        Enter email: <input type="email" name="email" id="email"><br>
        New password: <input type="password" name="new_password" id="new_password"><br>
        Re-enter new password: <input type="password" name="confirm_new_pw" id="confirm_new_pw"><br>
        <input type="submit" name="submit">
    </form>

    <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
        alert("Invalid or expired reset link");
    } else {
        document.getElementById("token").value = token;
    } //here we extract the token from the url and add into the hiddedn input

    document.getElementById("forgetPasswordForm").onsubmit = function(e) {
        const email = document.getElementById("email").value.trim();
        const newPassword = document.getElementById("new_password").value.trim();
        const confirmNewPassword = document.getElementById("confirm_new_pw").value.trim();

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address.");
            e.preventDefault();
            return false;
        }

        const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        if (!pwRegex.test(newPassword)) {
            alert("Password must be at least 8 characters and include uppercase, lowercase, number, and special character.");
            e.preventDefault();
            return false;
        }

        if (newPassword !== confirmNewPassword) {
            alert("Passwords do not match!");
            e.preventDefault();
            return false;
        }

        return true;
    }
    </script>
    <script src="static/refreshPage_home.js"></script>
</body>
</html>
