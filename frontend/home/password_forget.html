<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
</head>
<body>
    <form id="forgetPasswordForm" action="http://127.0.0.1:8000/reset_pw/forget_pw" method="POST"  enctype="application/x-www-form-urlencoded">
        Enter email: <input type="email" name="email" id="email"><br>
        New password: <input type="password" name="new_password" id="new_password"><br>
        Re-enter new password: <input type="password" name="confirm_new_pw" id="confirm_new_pw"><br>
        <input type="submit" name="submit">
    </form>

    <script>
    document.getElementById("forgetPasswordForm").onsubmit = function(e) {
        const email = document.getElementById("email").value.trim();
        const newPassword = document.getElementById("new_password").value.trim();
        const confirmNewPassword = document.getElementById("confirm_new_pw").value.trim();

        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address.");
            e.preventDefault();
            return false;
        }

        // Password validation
        const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        if (!pwRegex.test(newPassword)) {
            alert("Password must be at least 8 characters and include uppercase, lowercase, number, and special character.");
            e.preventDefault();
            return false;
        }

        // Confirm password
        if (newPassword !== confirmNewPassword) {
            alert("Passwords do not match!");
            e.preventDefault();
            return false;
        }

        return true; // all validations passed
    }
    </script>
</body>
</html>
