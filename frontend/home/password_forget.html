<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <title>Reset Password — Serendib AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <h2>Reset Your Password</h2>

    <form id="forgetPasswordForm"
          method="POST"
          enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="token" id="token">

        New password:
        <input type="password" name="new_password" id="new_password" required><br>

        Re-enter new password:
        <input type="password" name="confirm_new_pw" id="confirm_new_pw" required><br>

        <input type="submit" value="Reset Password">
    </form>

    
    <script src="static/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/toast.js"></script>
    <script src="static/refreshPage_home.js"></script>

    <script>
       
        document.getElementById("forgetPasswordForm").action = `${API_BASE}/reset_pw/forget_pw`;

        
        const params = new URLSearchParams(window.location.search);
        const token  = params.get("token");

        if (!token) {
            showToast("⚠️ Invalid or expired reset link", "error");
        } else {
            document.getElementById("token").value = token;
        } //here we extract the token from the url and add into the hidden input

        document.getElementById("forgetPasswordForm").onsubmit = function(e) {
            const newPassword        = document.getElementById("new_password").value.trim();
            const confirmNewPassword = document.getElementById("confirm_new_pw").value.trim();

            const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
            if (!pwRegex.test(newPassword)) {
                showToast("⚠️ Password must be at least 8 characters and include uppercase, lowercase, number, and special character.", "warning");
                e.preventDefault();
                return false;
            }

            if (newPassword !== confirmNewPassword) {
                showToast("⚠️ Passwords do not match!", "warning");
                e.preventDefault();
                return false;
            }

            return true;
        }

        document.addEventListener("DOMContentLoaded", function(e){
            const params= new URLSearchParams(window.location.search);
            const error= params.get("error");

            if(error=="email_not_found"){
                showToast("❌ Email not found. Please register first.", "error");
            }else if(error=="mismatched_passwords"){
                showToast("⚠️ Passwords do not match!", "warning");
            }else if(error=="server_error"){
                showToast("❌ Something went wrong. Please try again.", "error");
            }

        });

    </script>

</body>
</html>
<!--action="http://127.0.0.1:8000/reset_pw/forget_pw"-->
