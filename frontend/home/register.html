<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="UTF-8">
       <title>log in</title>

    </head>
    <body>
        <form  id="registerForm"  method="POST">
            name<input type="text" name="name" id="name" required><br>
            email<input type="email" name="email" id="email" required><br>
            
            password<input type="password" name="password" id="password" required><br>
            reenter password<input type="password" name="confirm_password" id="confirm_password" required><br>
            <input type="submit" name="register">
        </form>
        
    <script src="static/config.js"></script>    

    <script src="static/refreshPage_home.js"></script>
    
     <script src="static/toast.js"></script>

    <script>

    document.getElementById("registerForm").action=  `${API_BASE}/register/`;


    document.getElementById("registerForm").onsubmit = function(e) {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;

        // Name validation: letters only, min 3 chars
        if (!/^[a-zA-Z ]{3,}$/.test(name)) {
            alert("Name must be at least 3 letters and contain only letters and spaces.");
            e.preventDefault();
            return false;
        }

        // Email validation: simple regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address.");
            e.preventDefault();
            return false;
        }

        // Password validation: min 6 chars, uppercase, lowercase, number, special char
        const pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
        if (!pwRegex.test(password)) {
            alert("Password must be at least 8 characters and include uppercase, lowercase, number, and special character.");
            e.preventDefault();
            return false;
        }

        // Confirm password
        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            e.preventDefault();
            return false;
        }

        return true; // all validations passed, allow form submission
    }
    
    
    
    document.addEventListener("DOMContentLoaded", function() {
        const params = new URLSearchParams(window.location.search);
        const error  = params.get("error");
        const success= params.get("success");

    const messages = {
        "passwords_not_match" : "⚠️ Passwords do not match",
        "invalid_name"        : "⚠️ Name must be at least 3 characters, letters only",
        "invalid_email"       : "⚠️ Invalid email address",
        "email_exists"        : "⚠️ This email is already registered",
        "weak_password"       : "⚠️ Password must include uppercase, lowercase, number and special character",
        "password_too_long"   : "⚠️ Password too long (max 64 characters)",
        "registration_failed" : "❌ Registration failed. Please try again."
    };

    if (error && messages[error]) {
        showToast(messages[error], "warning");
    }
});
        </script>

    </body>

</html>
