<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Serendib AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/passwordToggle.css">
    <link rel="stylesheet" href="/frontend/static/css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --darker: #060E1A;
            --dark:   #0A1628;
            --card:   #0F1E35;
            --green:  #1A6B3C;
            --green2: #22C55E;
            --gold:   #D4A843;
            --gold2:  #F5C842;
            --border: rgba(212,168,67,0.2);
            --text:   #E8E0D0;
            --muted:  rgba(232,224,208,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
    min-height: 100vh;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;

    background-image: 
        radial-gradient(ellipse 70% 70% at 15% 30%, rgba(26,107,60,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 70%, rgba(212,168,67,0.12) 0%, transparent 60%),
        linear-gradient(rgba(6,14,26,0.75), rgba(6,14,26,0.75)),
        url('/frontend/background_images/images.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* delete the body::before block entirely */

        /*body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 70% at 15% 30%, rgba(26,107,60,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 85% 70%, rgba(212,168,67,0.07) 0%, transparent 60%),
                var(--darker);
            z-index: 0;
        }*/

        .back-home {
            position: fixed;
            top: 1.5rem; left: 1.5rem; z-index: 10;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--muted); text-decoration: none;
            font-size: 0.875rem; transition: color 0.2s;
        }
        .back-home:hover { color: var(--gold); }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px; padding: 1.5rem;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            position: relative; overflow: hidden;
            animation: cardReveal 0.6s ease forwards;
            opacity: 0; transform: translateY(20px);
        }
        @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }

        .login-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem; font-weight: 700;
            color: var(--gold); text-decoration: none;
            display: inline-block; margin-bottom: 0.5rem;
        }
        .brand-logo span { color: var(--green2); }
        .brand-tagline { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem; font-weight: 700;
            color: var(--text); text-align: center; margin-bottom: 0.375rem;
        }
        .card-subtitle {
            font-size: 0.875rem; color: var(--muted);
            text-align: center; margin-bottom: 2rem; font-weight: 300;
        }

        .divider { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }

        .field-group { margin-bottom: 1.25rem; }
        .field-label {
            display: block; font-size: 0.8rem; font-weight: 500;
            color: var(--muted); letter-spacing: 0.05em;
            text-transform: uppercase; margin-bottom: 0.5rem;
        }
        .field-input {
            width: 100%;
            background: rgba(6,14,26,0.6);
            border: 1px solid rgba(232,224,208,0.1);
            border-radius: 10px; padding: 0.75rem 1rem;
            color: var(--text); font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; outline: none; transition: all 0.2s ease;
        }
        .field-input:focus {
            border-color: rgba(212,168,67,0.5);
            box-shadow: 0 0 0 3px rgba(212,168,67,0.08);
            background: rgba(6,14,26,0.8);
        }
        .field-input::placeholder { color: rgba(232,224,208,0.25); }

       
        .password-box { position: relative; }
        .password-box .field-input { padding-right: 3rem; }
        .password-box .fa-eye,
        .password-box .fa-eye-slash {
            position: absolute; right: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); cursor: pointer;
            font-size: 0.9rem; transition: color 0.2s;
        }
        .password-box .fa-eye:hover,
        .password-box .fa-eye-slash:hover { color: var(--gold); }

        .links-row {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.75rem;
            flex-wrap: wrap; gap: 0.5rem;
        }
        .links-row a {
            font-size: 0.8rem; color: var(--muted);
            text-decoration: none; transition: color 0.2s;
        }
        .links-row a:hover { color: var(--gold); }

        .submit-btn {
            width: 100%; padding: 0.875rem;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border: none; border-radius: 10px;
            color: #0A1628; font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.02em;
            cursor: pointer; transition: all 0.3s ease; margin-bottom: 1.5rem;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(212,168,67,0.3); }
        .submit-btn:active { transform: translateY(0); }

        .register-prompt { text-align: center; font-size: 0.875rem; color: var(--muted); }
        .register-prompt a {
            color: var(--gold); text-decoration: none;
            font-weight: 600; transition: color 0.2s;
        }
        .register-prompt a:hover { color: var(--gold2); }

       
        #verify-link {
            display: none; margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(212,168,67,0.08);
            border: 1px solid rgba(212,168,67,0.25);
            border-radius: 8px; text-align: center;
        }
        #verify-link a { font-size: 0.85rem; color: var(--gold); text-decoration: none; }
        #verify-link a:hover { color: var(--gold2); }

        @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; } }
    </style>
</head>
<body >

    
    <a href="home.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Home
    </a>

    <div class="login-wrapper">
        <div class="login-card">

            
            <div class="brand">
                <a href="home.html" class="brand-logo">Serendib<span>AI</span></a>
                <p class="brand-tagline">Sri Lanka Trip Planner</p>
            </div>

            <h1 class="card-title">Welcome back</h1>
            <p class="card-subtitle">Sign in to continue planning your journey</p>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">Enter your details</span>
                <div class="divider-line"></div>
            </div>

            
            <form id="LoginForm" method="POST">

                
                <div class="field-group">
                    <label class="field-label" for="email">Email Address</label>
                    <input
                        class="field-input"
                        type="email"
                        name="username"
                        id="email"
                        placeholder="you@example.com"
                        required>
                </div>

                
                <div class="field-group">
                    <label class="field-label" for="password">Password</label>
                    <div class="password-box">
                        <input
                            class="field-input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required>
                        <i class="fa-solid fa-eye"
                           id="eye_password"
                           onclick="togglePassword('password', 'eye_password')">
                        </i>
                    </div>
                </div>

                
                <div class="links-row">
                    <a href="request_reset_pw.html">Forgot password?</a>
                    <a href="verify_mail.html">Didn't verify your email?</a>
                </div>

                
                <input class="submit-btn" type="submit" name="login" value="Sign In">

            </form>

            
            <div id="verify-link">
                <a href="verify_mail.html">📧 Resend verification email</a>
            </div>

            <p class="register-prompt">
                Don't have an account? <a href="register.html">Create one free</a>
            </p>

        </div>
    </div>

    
    <script src="static/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/toast.js"></script>
    <script src="static/refreshPage_home.js"></script>
    <script src="static/passwordToggle.js"></script>

    <script>
        document.getElementById("LoginForm").action = `${API_BASE}/login/`;

        document.getElementById('LoginForm').addEventListener('submit', function(event) {
            let email    = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            if (email == '' || password == '') {
                event.preventDefault();
                showToast("⚠️ Email and password cannot be empty", "warning");
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
            const params  = new URLSearchParams(window.location.search);
            const error   = params.get("error");
            const success = params.get("success");

            if (success === "already_verified") {
                 showToast("✅ Your email is already verified. Please log in.", "success");
            } if (success === "email_verified") {
                 showToast("✅ Successfully verified you email. Please log in.", "success");
            }
            if (success === "password_updated") {
                 showToast("✅ Successfully update your password. Please log in.", "success");
            }
            if (error === "email_not_found") {
                showToast("❌ Email not found. Please register first.", "error");
            } else if (error === "wrong_password") {
                showToast("❌ Wrong password. Please try again.", "error");
            } else if (error === "not_verified") {
                showToast("⚠️ Email not verified. First verify your email.", "warning");
                // show verify banner
                document.getElementById("verify-link").style.display = "block";
            } else if (error === "server_error") {
                showToast("❌ Something went wrong. Please try again.", "error");
            }
        });
    </script>

</body>
</html>
