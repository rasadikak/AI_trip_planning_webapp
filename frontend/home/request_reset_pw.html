<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset="UTF-8">
       <title>request reset password</title>
       <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    </head>
    <body>
        <form id = 'RequestResetPassword'  method="POST">
            email<input type="email" name="email" id="email" required><br>
            
            
            <input type="submit" name="login">
        </form>

        <script src="static/config.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
        <script src="static/toast.js"></script>
        <script src="static/refreshPage_home.js"></script>

        <script>

                document.getElementById("RequestResetPassword").action=  `${API_BASE}/reset_pw/request_reset`;

                document.getElementById('RequestResetPassword').addEventListener('submit', function(event){
                    let email= document.getElementById('email').value;
                
                    if (email=='' ){
                        event.preventDefault();
                        showToast("⚠️ Email cannot be empty", "warning");
                    }
                });


                document.addEventListener("DOMContentLoaded", function() {
                    const params  = new URLSearchParams(window.location.search);
                    const error   = params.get("error");
                    const success = params.get("success");

                    

                    if (error === "user_not_found") {
                        showToast("❌ Email not found. Please register first.", "error");
                    } else if (error === "send_failed") {
                        showToast("❌ Failed to send reset email. Please try again.", "error");
                    } else if (error === "server_error") {
                        showToast("❌ Something went wrong. Please try again.", "error");
                    }
        });
        
        </script>

    </body>

</html>
