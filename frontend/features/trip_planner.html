<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trip Planner</title>
</head>
<body>

  <!-- Header -->
  <header>
    <h1 align="center">AI Trip Planner</h1>
  </header>

  <main>

    <!-- Trip Planning Section -->
    <section>
      <h2>Plan Your Trip</h2>

      <form id="tripForm" method="POST">

        <div>
          <label>Destination Type</label><br>
          <select id="destinationType">
            <option value="">Select</option>
            <option value="beach">Beach & Coastal</option>
            <option value="upcountry">Hill Country & Nature</option>
            <option value="city">City / Colombo</option>
            <option value="safari">Wildlife & Safari</option>
            <option value="culturel">Cultural & Heritage</option>
          </select>
        </div>

        <br>

        <div>
          <label>Budget</label><br>
          <select id="budget">
            <option value="">Select</option>
            <option value="low">Low</option>
            <option value="mid">Mid</option>
            <option value="high">High</option>
          </select>
        </div>

        <br>

        <div>
          <label>Number of Days</label><br>
          <input type="number" id="numDays" min="1" max="30" placeholder="e.g., 3">
        </div>

        <br>

        <div>
          <label>Number of People</label><br>
          <input type="number" id="numPeople" min="1" max="20" placeholder="e.g., 2">
        </div>

        <br>

        <div>
          <label>Accommodation Type</label><br>
          <select id="accommodation">
            <option value="">Select</option>
            <option value="hotel">Hotel</option>
            <option value="tents">Tents / Camping</option>
            <option value="five_star">Five Star Hotel</option>
            <option value="kabana">Kabana / Guesthouse</option>
          </select>
        </div>

        <br>

        <div>
          <label>Food Preference</label><br>
          <select id="foodPreference">
            <option value="">Select</option>
            <option value="traditional">Traditional</option>
            <option value="spicy">Spicy / Halal</option>
            <option value="expensive">Fine Dining</option>
          </select>
        </div>

        <br>

        <button type="submit">Plan Trip</button>

      </form>
    </section>

    <hr>

    <!-- Image-Based Destination Search -->
    <section>
      <h2>Find Destination from Image</h2>
      <form id="ImageSearchForm" method="POST" name= 'img' enctype='multipart/form-data' action='http://127.0.0.1:8000/img_based_search'>
      <input type="file" id="destImage" accept=".jpg, .png, .jpeg" required>
      <br><br>
      <input type='submit' value='search'>
      </form>
      <div id="imageResult"></div>
    </section>

    <hr>

    <!-- Chatbot Section -->
    <section>
      <h2>AI Chatbot</h2>

      <textarea id="chatInput" rows="4" cols="50" placeholder="Ask me about your trip..."></textarea>
      <br><br>

      <button>Send</button>

      <div id="chatOutput"></div>
    </section>

    <hr>

    <!-- Trip Plan Output -->
    <section>
      <h2>Your Trip Plan</h2>
      <div id="tripOutput"></div>
      <br>
      <button>Download PDF</button>
    </section>

    <hr>

    <!-- Map Section -->
    <section>
      <h2>Map View</h2>
      <div id="map">
        Map will be shown here
      </div>
    </section>

  </main>

</body>
</html>
