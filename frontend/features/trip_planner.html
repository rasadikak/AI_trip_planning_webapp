<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trip Planner</title>
</head>
<body>

  <!-- Header -->
  <header>
    <h1 align="center">AI Trip Planner</h1>
    
    <a href="profile.html">profile</a>

  </header>

  <main>

    <!-- Trip Planning Section -->
    <section>
      <h2>Plan Your Trip</h2>

      <form id="tripForm" method="POST" name="tripForm" action="http://127.0.0.1:8000/trip_planner/">

        <div>
          <label>Destination Type</label><br>
          <select id="destinationType" name="destinationType">
            <option value="">Select</option>
            <option value="beach">Beach & Coastal</option>
            <option value="upcountry">Hill Country & Nature</option>
            <option value="city">City / Colombo</option>
            <option value="safari">Wildlife & Safari</option>
            <option value="culturel">Cultural & Heritage</option>
          </select>
        </div>

        <br>

        <div>
          <label>Budget</label><br>
          <select id="budget" name="budget">
            <option value="">Select</option>
            <option value="low">Low</option>
            <option value="mid">Mid</option>
            <option value="high">High</option>
          </select>
        </div>

        <br>

        <div>
          <label>Number of Days</label><br>
          <input type="number" id="numDays" min="1" max="30" placeholder="e.g., 3" name="numDays">
        </div>

        <br>

        <div>
          <label>Number of People</label><br>
          <input type="number" id="numPeople" min="1" max="20" placeholder="e.g., 2"  name="numPeople">
        </div>

        <br>

        <div>
          <label>Accommodation Type</label><br>
          <select id="accommodation" name="accommodation">
            <option value="">Select</option>
            <option value="hotel">Hotel</option>
            <option value="tents">Tents / Camping</option>
            <option value="five_star">Five Star Hotel</option>
            <option value="kabana">Kabana / Guesthouse</option>
          </select>
        </div>

        <br>

        
        <div>
  <label>Food Preferences 🍽️</label><br>

  <input type="checkbox" name="foodPreference" value="traditional" id="food_traditional">
  <label for="food_traditional">Sri Lankan Traditional</label><br>

  <input type="checkbox" name="foodPreference" value="seafood" id="food_seafood">
  <label for="food_seafood">Seafood</label><br>

  <input type="checkbox" name="foodPreference" value="spicy" id="food_spicy">
  <label for="food_spicy">Spicy Food</label><br>

  <input type="checkbox" name="foodPreference" value="vegetarian" id="food_vegetarian">
  <label for="food_vegetarian">Vegetarian</label><br>

  <input type="checkbox" name="foodPreference" value="vegan" id="food_vegan">
  <label for="food_vegan">Vegan</label><br>

  <input type="checkbox" name="foodPreference" value="halal" id="food_halal">
  <label for="food_halal">Halal</label><br>

  <input type="checkbox" name="foodPreference" value="street_food" id="food_street_food">
  <label for="food_street_food">Street Food</label><br>

  <input type="checkbox" name="foodPreference" value="international" id="food_international">
  <label for="food_international">International Cuisine</label><br>

  <input type="checkbox" name="foodPreference" value="fine_dining" id="food_fine_dining">
  <label for="food_fine_dining">Fine Dining</label><br>

  <input type="checkbox" name="foodPreference" value="fast_food" id="food_fast_food">
  <label for="food_fast_food">Fast Food</label><br>
</div>

        <br>

        <button type="submit">Plan Trip</button>

      </form>
      <div id="tripResult">

      </div>
    </section>

    <hr>

    <!-- Image-Based Destination Search -->
    <section>
      <h2>Find Destination from Image</h2>
      <form id="ImageSearchForm" method="POST"  enctype='multipart/form-data' action='http://127.0.0.1:8000/img_based_search/'>
      <input type="file" id="img" name= 'img' accept=".jpg, .png, .jpeg" required>
      <br><br>
      <input type='submit' value='search'>
      </form>
      <div id="imageResult"></div>
    </section>

    <hr>

    <!-- Chatbot Section -->
    <section>
      <h2>AI Chatbot</h2>
      <form id="chatForm" action="http://127.0.0.1:8000/chatbot/" method="POST" name="chatForm" >
      <textarea id="chatInput" name="chatInput" rows="4" cols="50" placeholder="Ask me about your trip..."></textarea>
      <br><br>

      <input type="submit" value="send">
      </form>

      <div id="chatOutput"></div>
    </section>

    <hr>

    <!-- Trip Plan Output -->
    <section>
      <h2>Your Trip Plan</h2>
      <div id="tripOutput"></div>
      <br>
      <button>Download PDF</button>
    </section>

    <hr>

    <!-- Map Section -->
    <section>
      <h2>Map View</h2>
      <div id="map">
        Map will be shown here
      </div>
    </section>

  </main>



  
  <script src="static/refreshPage.js"></script>
  <script src="static/tripPlannerOutput.js"></script>
   <script src="static/outputImage.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
