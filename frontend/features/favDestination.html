<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourite Places — Serendib AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/static/css/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --darker: #060E1A;
            --card:   #0F1E35;
            --card2:  #0C1A2E;
            --green2: #22C55E;
            --gold:   #D4A843;
            --gold2:  #F5C842;
            --border: rgba(212,168,67,0.2);
            --border2:rgba(232,224,208,0.08);
            --text:   #E8E0D0;
            --muted:  rgba(232,224,208,0.5);
            --danger: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--darker);
            font-family: 'Outfit', sans-serif;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 10% 10%, rgba(26,107,60,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 90% 90%, rgba(212,168,67,0.06) 0%, transparent 60%),
                var(--darker);
            z-index: 0; pointer-events: none;
        }

        /* Header */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(6,14,26,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
        }

        .header-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; font-weight: 700;
            color: var(--gold); text-decoration: none;
        }
        .header-logo span { color: var(--green2); }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text); text-decoration: none;
            font-size: 0.85rem; font-weight: 500;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* Main */
        main {
            position: relative; z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-weight: 700;
            color: var(--text); margin-bottom: 0.375rem;
        }
        .page-subtitle {
            font-size: 0.875rem; color: var(--muted);
            margin-bottom: 2rem; font-weight: 300;
        }

        .section-card {
            background: var(--card);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 1.75rem;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.05em; text-transform: uppercase;
            margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        /* favList — id preserved, items styled via JS inline styles will be overridden here */
        #favList {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Style for dynamically created fav items from favDestinations.js
           JS creates divs with inline border/padding/margin — these act as fallback */
        #favList > div {
            background: rgba(6,14,26,0.5) !important;
            border: 1px solid var(--border2) !important;
            border-radius: 10px !important;
            padding: 1rem 1.25rem !important;
            margin-bottom: 0 !important;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        #favList > div h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        #favList > div p {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0;
        }

        #favList > div button {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 6px;
            color: rgba(239,68,68,0.8);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        #favList > div button:hover {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.4);
            color: #EF4444;
        }

        /* Empty state */
        #favList p {
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 2rem 0;
        }

        @media (max-width: 480px) {
            .section-card { padding: 1.25rem; }
            main { padding: 1.5rem 1rem 3rem; }
            header { padding: 0.875rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="trip_planner.html" class="header-logo">Serendib<span>AI</span></a>
        <!-- Back to Profile — href preserved -->
        <a href="profile.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Profile
        </a>
    </header>

    <main>

        <h1 class="page-title">⭐ Favourite Places</h1>
        <p class="page-subtitle">Your saved Sri Lanka destinations</p>

        <div class="section-card">
            <div class="card-title">
                <i class="fa-solid fa-star"></i>
                Your Saved Destinations
            </div>

            <!-- favList — id preserved -->
            <div id="favList"></div>
        </div>

    </main>

    <!-- Scripts — order and paths preserved -->
    <script src="static/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="static/toast.js"></script>
    <script src="static/favDestinations.js"></script>
    <script src="static/refreshPage.js"></script>

</body>
</html>
